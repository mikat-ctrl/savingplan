<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学費貯金プラン シミュレーター</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{--bg:#f4f6fb;--card:#fff;--ink:#1e293b;--sub:#64748b;--line:#e5e7eb;--accent:#4f46e5;--accent2:#6366f1;--green:#059669;--amber:#d97706;--red:#dc2626;--greenbg:#ecfdf5;--redbg:#fef2f2;--bluebg:#eef2ff;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,"Noto Sans Thai",Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.55;-webkit-text-size-adjust:100%}
  .wrap{max-width:1180px;margin:0 auto;padding:20px}
  h1{font-size:22px;margin:0 0 4px}
  .muted{color:var(--sub);font-size:13px}
  .grid{display:grid;gap:14px}
  .cards{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(15,23,42,.05)}
  .kpi .label{font-size:12px;color:var(--sub);min-height:30px}
  .kpi .value{font-size:20px;font-weight:700;margin-top:4px}
  .kpi .value.sm{font-size:16px}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:700}
  .ok{background:var(--greenbg);color:var(--green)} .bad{background:var(--redbg);color:var(--red)}
  .up{color:var(--green)} .down{color:var(--red)}
  /* hero */
  .hero{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .viz{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px}
  .viz .t{font-size:13px;font-weight:700;color:var(--sub)}
  .viz svg{max-width:210px;width:100%}
  .viz .cap{font-size:12px;color:var(--sub)}
  .viz .big{font-size:14px;font-weight:700;color:var(--ink)}
  details{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:14px;overflow:hidden}
  summary{cursor:pointer;padding:14px 16px;font-weight:700;list-style:none;display:flex;justify-content:space-between;align-items:center;font-size:14px}
  summary::-webkit-details-marker{display:none}
  summary::after{content:"▾";color:var(--sub)} details[open] summary::after{content:"▴"}
  .body{padding:0 16px 16px}
  .row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  label.f{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--sub)}
  input,select{padding:9px 10px;border:1px solid var(--line);border-radius:10px;font-size:16px;width:100%;background:#fff;color:var(--ink)}
  input[type=range]{padding:0}
  .sliderval{font-weight:700;color:var(--accent)}
  table{border-collapse:collapse;width:100%;font-size:12.5px;background:var(--card)}
  th,td{border:1px solid var(--line);padding:6px 8px;text-align:right;white-space:nowrap}
  th{background:#f8fafc;position:sticky;top:0;font-weight:700;color:var(--sub)}
  td.l,th.l{text-align:left}
  tr.alert td{background:var(--redbg)} tr.goal td{outline:2px solid var(--green);outline-offset:-2px}
  .tablewrap{overflow:auto;max-height:520px;border:1px solid var(--line);border-radius:16px}
  .btn{background:var(--accent);color:#fff;border:none;padding:10px 15px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700}
  .btn.ghost{background:#fff;color:var(--accent);border:1px solid var(--accent)}
  .btn.sm{padding:6px 10px;font-size:12px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0 16px}
  .note{font-size:12px;color:var(--sub);background:var(--bluebg);border:1px solid #e0e7ff;border-radius:12px;padding:10px 12px;margin-top:10px}
  .chartbox{height:340px}
  .small{font-size:12px}
  .tag{font-size:11px;color:var(--sub);background:#f1f5f9;padding:1px 6px;border-radius:6px}
  .stageTbl input[type=text],.stageTbl input[type=number]{font-size:13px;padding:6px}
  .stageTbl td,.stageTbl th{text-align:center}
  h3.sec{margin:18px 0 8px;font-size:15px}
  .actAdd{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
  .actAdd label.f{flex:1;min-width:90px}
  .actList{margin-top:12px;display:flex;flex-direction:column;gap:6px}
  .actItem{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--line);border-radius:10px;font-size:13px}
  .actItem .d{color:var(--sub);font-weight:600}
  .actItem .v{font-weight:700}
  .xbtn{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:2px 6px}
  @media(max-width:760px){
    .wrap{padding:14px 12px}
    h1{font-size:19px}
    .hero{grid-template-columns:1fr}
    .chartbox{height:280px}
    .toolbar .btn{flex:1 1 auto}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 data-i18n="title"></h1>
  <div class="muted" data-i18n="intro"></div>

  <div class="toolbar">
    <button class="btn" onclick="calc()" data-i18n="btnRecalc"></button>
    <button class="btn" onclick="exportHTML()" data-i18n="btnExport"></button>
    <button class="btn ghost" onclick="saveLS(true)" data-i18n="btnSave"></button>
    <button class="btn ghost" onclick="resetAll()" data-i18n="btnReset"></button>
    <button class="btn ghost" id="langBtn" onclick="toggleLang()"></button>
    <span class="muted small" id="savedAt"></span>
  </div>

  <!-- Hero circular visuals -->
  <div class="hero">
    <div class="card viz"><div class="t" data-i18n="ringLabel"></div><div id="ring"></div><div class="big" id="ringSub"></div><div class="cap" id="ringCap"></div></div>
    <div class="card viz"><div class="t" data-i18n="gaugeLabel"></div><div id="gauge"></div><div class="big" id="gaugeSub"></div><div class="cap" id="gaugeCap"></div></div>
  </div>

  <!-- KPI cards -->
  <div class="grid cards" style="margin-bottom:14px">
    <div class="card kpi"><div class="label" data-i18n="kpi1"></div><div class="value sm" id="k1">—</div></div>
    <div class="card kpi"><div class="label" data-i18n="kpi2"></div><div class="value sm" id="k2">—</div></div>
    <div class="card kpi"><div class="label" data-i18n="kpi3"></div><div class="value sm" id="k3">—</div></div>
    <div class="card kpi"><div class="label" data-i18n="kpi4"></div><div class="value sm" id="k4">—</div></div>
  </div>

  <div class="card" style="margin-bottom:14px">
    <div class="chartbox"><canvas id="chart"></canvas></div>
    <div class="legend muted small" data-i18n="legend" style="margin-top:8px"></div>
  </div>

  <h3 class="sec" data-i18n="annualTitle"></h3>
  <div class="tablewrap" style="margin-bottom:14px"><table id="mainTbl"></table></div>

  <details open>
    <summary data-i18n="sec1"></summary>
    <div class="body">
      <div class="row">
        <label class="f"><span data-i18n="rate"></span> <span class="sliderval" id="rateOut"></span><input type="range" id="rate" min="0" max="8" step="0.1"></label>
        <label class="f"><span data-i18n="tax"></span> <span class="sliderval" id="taxOut"></span><input type="range" id="tax" min="0" max="30" step="1"></label>
        <label class="f"><span data-i18n="rent"></span><input type="number" id="rent"></label>
        <label class="f"><span data-i18n="startYM"></span><div style="display:flex;gap:6px"><input type="number" id="startY" style="width:90px"><select id="startM"></select></div></label>
      </div>
      <div class="row" style="margin-top:12px">
        <label class="f"><span data-i18n="inc1"></span><input type="number" id="inc1"></label>
        <label class="f"><span data-i18n="inc2"></span><input type="number" id="inc2"></label>
        <label class="f"><span data-i18n="switchYear"></span><input type="number" id="switchYear"></label>
      </div>
      <div class="row" style="margin-top:12px">
        <label class="f"><span data-i18n="sal1"></span><input type="number" id="sal1"></label>
        <label class="f"><span data-i18n="sal2"></span><input type="number" id="sal2"></label>
        <label class="f"><span data-i18n="bon1"></span><input type="number" id="bon1"></label>
        <label class="f"><span data-i18n="bon2"></span><input type="number" id="bon2"></label>
      </div>
      <div class="note" data-i18n="note1"></div>
    </div>
  </details>

  <details>
    <summary data-i18n="sec2"></summary>
    <div class="body">
      <div class="muted small" data-i18n="masterNote"></div>
      <div class="tablewrap" style="margin-top:10px"><table class="stageTbl" id="stageTbl"></table></div>
      <button class="btn ghost sm" style="margin-top:8px" onclick="addStage()" data-i18n="btnAddRow"></button>
      <div class="row" style="margin-top:12px">
        <label class="f"><span data-i18n="b1"></span><input type="number" id="b1"></label>
        <label class="f"><span data-i18n="b2"></span><input type="number" id="b2"></label>
      </div>
    </div>
  </details>

  <details open>
    <summary data-i18n="sec3"></summary>
    <div class="body">
      <div class="muted small" data-i18n="actualNote"></div>
      <div class="actAdd" style="margin-top:12px">
        <label class="f"><span data-i18n="addYear"></span><select id="aY"></select></label>
        <label class="f"><span data-i18n="addMonth"></span><select id="aM"></select></label>
        <label class="f" style="flex:2"><span data-i18n="addBal"></span><input type="number" id="aBal" inputmode="numeric"></label>
        <button class="btn" onclick="addActual()" data-i18n="btnAdd"></button>
      </div>
      <div class="actList" id="actList"></div>
    </div>
  </details>

  <div class="note" data-i18n="disclaimer"></div>
</div>

  rate:"ผลตอบแทนการลงทุน (ต่อปี)",tax:"ภาษีกำไรจากการลงทุน (%)",rent:"ค่าเช่าต่อเดือน (THB, คงที่)",startYM:"เริ่มออม (ปี/เดือน)",
  inc1:"รายได้ครัวเรือน ช่วง1 (THB/เดือน)",inc2:"รายได้ครัวเรือน ช่วง2 (THB/เดือน)",switchYear:"ปีที่รายได้เปลี่ยนเป็นช่วง2",
  sal1:"ออมต่อเดือน ช่วง1 (เงินเดือน, THB)",sal2:"ออมต่อเดือน ช่วง2 (เงินเดือน, THB)",bon1:"ออมจากโบนัส ช่วง1 (ต่อปี, THB)",bon2:"ออมจากโบนัส ช่วง2 (ต่อปี, THB)",
  note1:"จังหวะ: ออมเงินเดือนเท่ากันทุกเดือน โบนัส<b>แบ่งครึ่งใน มิ.ย. และ ธ.ค.</b> เตือนเมื่อ <b>① รายได้ &lt; 150,000 THB</b> หรือ <b>② (ค่าเช่า+ค่าเล่าเรียนรายเดือน) ÷ รายได้ &gt; 40%</b> (ค่าเล่าเรียนรายเดือน = ค่าเล่าเรียนปีนั้น ÷ 12)",
  sec2:"② ตารางค่าเล่าเรียน (ช่วงอายุ → ต่อปี ต่อคน)",
  masterNote:"ค่าเล่าเรียนต่อปีต่อคนตามอายุ แก้ตัวเลขเมื่อทราบค่าจริง ค่าเล่าเรียน<b>จ่ายล่วงหน้าครึ่งปี (ก.พ. & ส.ค.)</b> ค่าแรกเข้า<b>จ่ายปีก่อนหน้า (ก.พ.)</b> ระยะที่ติ๊ก 'เป้าหมาย' (เช่น โคเซ็น+มหาวิทยาลัย) รวมสองคนคือเป้าหมายการออม",
  stage:["ระดับ","อายุจาก","อายุถึง","ต่อปี(THB)","ค่าแรกเข้า(THB)","เป้าหมาย",""],
  btnAddRow:"＋ เพิ่มแถว",delete:"ลบ",
  b1:"ปีเกิด Kid1",b2:"ปีเกิด Kid2",
  sec3:"③ กรอกยอดจริง (ยอดเงินสิ้นเดือน, THB)",
  actualNote:"เพิ่มยอดสิ้นเดือนของเดือนที่ทราบ เดือนที่เพิ่มจะแสดงเป็นจุดเขียวเทียบกับเส้นแผน",
  addYear:"ปี",addMonth:"เดือน",addBal:"ยอดสิ้นเดือน (THB)",btnAdd:"เพิ่ม",listEmpty:"ยังไม่มีข้อมูลจริง เพิ่มด้านบน",
  annualTitle:"สรุปรายปี (ณ สิ้น ธ.ค.)",
  main:["ปี","Kid1","Kid2","ค่าเล่าเรียน(เงินสด)","ออม","สุทธิ","กำไร","ยอด(แผน)","ยอด(จริง)","รายได้/เดือน","สัดส่วนคงที่","สถานะ"],
  safe:"ปลอดภัย",alert:"เตือน",
  disclaimer:"เครื่องมือนี้เป็นการจำลองการวางแผนครัวเรือนอย่างง่าย ไม่ใช่คำแนะนำการลงทุน ผลลัพธ์เปลี่ยนตามสมมติฐาน (ผลตอบแทน ค่าเล่าเรียน อัตราแลกเปลี่ยน ฯลฯ)",
  months:["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."],
  langBtn:"日本語"
 }
};
const LANGS=["ja","en","th"];

const DEF={
  lang:"ja",rate:3.5,tax:0,rent:24000,
  inc1:200000,inc2:150000,switchYear:2035,
  sal1:80000,sal2:55000,bon1:300000,bon2:50000,
  startY:2025,startM:10,b1:2021,b2:2024,
  stages:[
    {name:"幼稚園",from:4,to:5,fee:97000,entry:0,target:false},
    {name:"小学校",from:6,to:11,fee:190000,entry:200000,target:false},
    {name:"中学校",from:12,to:14,fee:285000,entry:0,target:false},
    {name:"高専(5年)",from:15,to:19,fee:450000,entry:0,target:true},
    {name:"大学編入(2年)",from:20,to:21,fee:600000,entry:0,target:true}
  ],
  actuals:{}
};
const Y0=2024,Y1=2047,LS="tuitionToolV3";
let S=load();
const t=k=>LANG[S.lang][k];

function load(){let ls=null;try{ls=JSON.parse(localStorage.getItem(LS));}catch(e){}const em=window.__STATE__||null;let pick=null;if(ls&&em)pick=((em.savedAt||0)>=(ls.savedAt||0))?em:ls;else pick=ls||em;return pick?Object.assign(JSON.parse(JSON.stringify(DEF)),pick):JSON.parse(JSON.stringify(DEF));}
function saveLS(flag){S.savedAt=Date.now();try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){}if(flag)document.getElementById("savedAt").textContent=t("savedAt")+new Date().toLocaleString();}
function exportHTML(){readInputs();S.savedAt=Date.now();const st="<scr"+"ipt>window.__STATE__="+JSON.stringify(S)+";</scr"+"ipt>";let src="<!DOCTYPE html>\n"+document.documentElement.outerHTML;src=src.replace("</head>",st+"\n</head>");const blob=new Blob([src],{type:"text/html"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="Tuition_Saving_Tool_data.html";document.body.appendChild(a);a.click();a.remove();alert(t("exportMsg"));}
function resetAll(){if(confirm("Reset all?")){const lang=S.lang;S=JSON.parse(JSON.stringify(DEF));S.lang=lang;localStorage.removeItem(LS);applyLang();fillInputs();buildStage();buildActual();calc();}}
function toggleLang(){S.lang=LANGS[(LANGS.indexOf(S.lang)+1)%LANGS.length];document.documentElement.lang=S.lang;applyLang();fillInputs();buildStage();buildActual();calc();}
function applyLang(){document.querySelectorAll("[data-i18n]").forEach(el=>{el.innerHTML=t(el.getAttribute("data-i18n"));});document.title=t("title");document.getElementById("langBtn").textContent=t("langBtn");}

const numIds=["rate","tax","rent","inc1","inc2","switchYear","sal1","sal2","bon1","bon2","startY","b1","b2"];
function fillInputs(){
  numIds.forEach(k=>document.getElementById(k).value=S[k]);
  const sm=document.getElementById("startM");sm.innerHTML="";
  t("months").forEach((mn,i)=>{const o=document.createElement("option");o.value=i+1;o.textContent=mn;sm.appendChild(o);});
  sm.value=S.startM;
  // actual add selectors
  const aY=document.getElementById("aY");aY.innerHTML="";for(let y=Y0;y<=Y1;y++){const o=document.createElement("option");o.value=y;o.textContent=y;aY.appendChild(o);}
  const now=new Date();aY.value=Math.min(Math.max(now.getFullYear(),Y0),Y1);
  const aM=document.getElementById("aM");aM.innerHTML="";t("months").forEach((mn,i)=>{const o=document.createElement("option");o.value=i+1;o.textContent=mn;aM.appendChild(o);});
  aM.value=now.getMonth()+1;
  syncRange();
}
function readInputs(){numIds.forEach(k=>S[k]=parseFloat(document.getElementById(k).value)||0);S.startM=parseInt(document.getElementById("startM").value)||1;}
function syncRange(){document.getElementById("rateOut").textContent=document.getElementById("rate").value+"%";document.getElementById("taxOut").textContent=document.getElementById("tax").value+"%";}

function buildStage(){
  const H=t("stage");
  let h="<tr>"+H.map(x=>`<th>${x}</th>`).join("")+"</tr>";
  S.stages.forEach((s,i)=>{h+=`<tr>
    <td><input type="text" value="${s.name}" onchange="updStage(${i},'name',this.value)"></td>
    <td><input type="number" value="${s.from}" style="width:60px" onchange="updStage(${i},'from',this.value)"></td>
    <td><input type="number" value="${s.to}" style="width:60px" onchange="updStage(${i},'to',this.value)"></td>
    <td><input type="number" value="${s.fee}" style="width:95px" onchange="updStage(${i},'fee',this.value)"></td>
    <td><input type="number" value="${s.entry}" style="width:95px" onchange="updStage(${i},'entry',this.value)"></td>
    <td><input type="checkbox" ${s.target?"checked":""} onchange="updStage(${i},'target',this.checked)" style="width:auto"></td>
    <td><button class="btn ghost sm" onclick="delStage(${i})">${t("delete")}</button></td></tr>`;});
  document.getElementById("stageTbl").innerHTML=h;
}
function updStage(i,k,v){if(k==="name")S.stages[i][k]=v;else if(k==="target")S.stages[i][k]=v;else S.stages[i][k]=parseFloat(v)||0;calc();}
function addStage(){S.stages.push({name:"new",from:0,to:0,fee:0,entry:0,target:false});buildStage();calc();}
function delStage(i){S.stages.splice(i,1);buildStage();calc();}
function feeForAge(age){for(const s of S.stages){if(age>=s.from&&age<=s.to)return s.fee;}return 0;}
function entryDueForAge(age){let e=0;for(const s of S.stages){if(s.entry>0&&s.from-1===age)e+=s.entry;}return e;}

function buildActual(){
  const keys=Object.keys(S.actuals).sort((a,b)=>{const[ya,ma]=a.split("-").map(Number),[yb,mb]=b.split("-").map(Number);return ya-yb||ma-mb;});
  const el=document.getElementById("actList");
  if(keys.length===0){el.innerHTML=`<div class="muted small">${t("listEmpty")}</div>`;return;}
  el.innerHTML=keys.map(k=>{const[y,m]=k.split("-");return `<div class="actItem"><span class="d">${y}/${String(m).padStart(2,"0")}</span><span class="v">${Number(S.actuals[k]).toLocaleString()} THB</span><button class="xbtn" onclick="delActual('${k}')">✕</button></div>`;}).join("");
}
function addActual(){const y=document.getElementById("aY").value,m=parseInt(document.getElementById("aM").value),b=parseFloat(document.getElementById("aBal").value);if(isNaN(b)){return;}S.actuals[`${y}-${m}`]=b;document.getElementById("aBal").value="";buildActual();calc();}
function delActual(k){delete S.actuals[k];buildActual();calc();}

function fmt(n){return Math.round(n).toLocaleString("en-US");}
function fmtY(y){return S.lang==="ja"?`${y}年`:(S.lang==="th"?`${y}`:`${y}`);}
function fmtYM(y,m){return S.lang==="ja"?`${y}年${m}月`:`${t("months")[m-1]} ${y}`;}
function fmtM(n){return (n/1e6).toFixed(2)+"M";}

function goalSum(){let g=0;S.stages.forEach(s=>{if(s.target)g+=s.fee*(s.to-s.from+1)+s.entry;});return g*2;}
function neededYear(){let mf=null;S.stages.forEach(s=>{if(s.target&&(mf===null||s.from<mf))mf=s.from;});if(mf===null)return null;return Math.min(S.b1,S.b2)+mf;}

function run(){
  readInputs();
  const rM=S.rate/100/12,taxF=1-S.tax/100,startIdx=(S.startY-Y0)*12+(S.startM-1);
  let bal=0,idx=0;const pts=[],yr={};
  for(let y=Y0;y<=Y1;y++){yr[y]={tut:0,inflow:0,profit:0,dec:0};
    for(let m=1;m<=12;m++,idx++){
      const profit=Math.max(0,bal)*rM*taxF;
      let inflow=0;
      if(idx>=startIdx){inflow+=(y<S.switchYear?S.sal1:S.sal2);if(m===6||m===12)inflow+=(y<S.switchYear?S.bon1:S.bon2)/2;}
      let out=0;
      [S.b1,S.b2].forEach(b=>{const age=y-b;const f=feeForAge(age);if(f>0&&(m===2||m===8))out+=f/2;if(m===2){const e=entryDueForAge(age);if(e>0)out+=e;}});
      bal=bal+profit+inflow-out;
      yr[y].profit+=profit;yr[y].inflow+=inflow;yr[y].tut+=out;
      pts.push({y,m,idx,bal});if(m===12)yr[y].dec=bal;
    }}
  return {pts,yr};
}

function calc(){
  const {pts,yr}=run();
  const goal=goalSum(),need=neededYear();
  const goalPlan=goal>0?pts.find(p=>p.bal>=goal):null;
  let lastAct=null;pts.forEach(p=>{if(S.actuals[`${p.y}-${p.m}`]!==undefined)lastAct=p;});
  let gapAtLast=0,planAtLast=0;
  if(lastAct){planAtLast=pts[lastAct.idx].bal;gapAtLast=S.actuals[`${lastAct.y}-${lastAct.m}`]-planAtLast;}
  const green=pts.map(p=>{const k=`${p.y}-${p.m}`;if(S.actuals[k]!==undefined)return S.actuals[k];if(lastAct&&p.idx>lastAct.idx)return p.bal+gapAtLast;return null;});
  let goalActual=null;if(lastAct&&goal>0){for(let i=0;i<pts.length;i++){if(green[i]!==null&&green[i]>=goal){goalActual=pts[i];break;}}}

  let firstAlert=null;const alertYears={};
  for(let y=2025;y<=Y1;y++){const inc=(y<S.switchYear?S.inc1:S.inc2);const ratio=inc>0?(S.rent+yr[y].tut/12)/inc:0;const al=(inc<150000)||(ratio>0.40);alertYears[y]=al;if(al&&firstAlert===null)firstAlert=y;}

  // ---- current-state for rings ----
  const now=new Date();const cy=Math.min(Math.max(now.getFullYear(),Y0),Y1),cm=now.getMonth()+1;
  let curBal,curBasis;
  if(lastAct){curBal=S.actuals[`${lastAct.y}-${lastAct.m}`];curBasis=t("nowActual")+" "+lastAct.y+"/"+lastAct.m;}
  else{const cp=pts.find(p=>p.y===cy&&p.m===cm)||pts[pts.length-1];curBal=cp.bal;curBasis=t("nowPlan");}
  drawRing(curBal,goal,curBasis);
  const gy=Math.min(Math.max(cy,2025),Y1);const ginc=(gy<S.switchYear?S.inc1:S.inc2);const gratio=ginc>0?(S.rent+yr[gy].tut/12)/ginc:0;
  drawGauge(gratio,gy);

  // KPIs
  document.getElementById("k1").innerHTML=`${fmt(goal)} THB<div class="muted small">${t("kpi1Need")} ${need?fmtY(need):"—"}〜</div>`;
  document.getElementById("k2").innerHTML=`${t("plan")} ${goalPlan?fmtY(goalPlan.y):t("notReached")}<div class="muted small">${t("actual")} ${lastAct?(goalActual?fmtY(goalActual.y):t("notReached")):t("noActual")}</div>`;
  document.getElementById("k3").innerHTML=lastAct?(goalActual?`<b>${fmtYM(goalActual.y,goalActual.m)}</b>`:t("notReached")):t("noActual");
  const k4=document.getElementById("k4");
  if(lastAct){const g=gapAtLast,sign=g>=0?"+":"−";k4.innerHTML=`<span class="${g>=0?'up':'down'}">${sign}${fmt(Math.abs(g))} THB</span><div class="muted small">${lastAct.y}/${lastAct.m}: ${t("actual")} ${fmt(S.actuals[`${lastAct.y}-${lastAct.m}`])} / ${t("plan")} ${fmt(planAtLast)}</div>`;}
  else k4.textContent=t("noActual");

  const M=t("main");
  let h="<tr>"+M.map((x,i)=>`<th class="${i===0?'l':''}">${x}</th>`).join("")+"</tr>";
  for(let y=2025;y<=Y1;y++){const a=yr[y];const inc=(y<S.switchYear?S.inc1:S.inc2);const ratio=(S.rent+a.tut/12)/inc;const al=alertYears[y];const actDec=S.actuals[`${y}-12`];
    const cls=(al?"alert ":"")+((goalPlan&&goalPlan.y===y)?"goal":"");
    h+=`<tr class="${cls}"><td class='l'>${y}</td><td>${y-S.b1}</td><td>${y-S.b2}</td>
      <td>${fmt(a.tut)}</td><td>${fmt(a.inflow)}</td><td>${fmt(a.inflow-a.tut)}</td><td>${fmt(a.profit)}</td>
      <td><b>${fmt(a.dec)}</b></td><td>${actDec!==undefined?fmt(actDec):'<span class="tag">—</span>'}</td>
      <td>${fmt(inc)}</td><td>${(ratio*100).toFixed(1)}%</td>
      <td class='l'>${al?`<span class="pill bad">${t("alert")}</span>`:`<span class="pill ok">${t("safe")}</span>`}</td></tr>`;}
  document.getElementById("mainTbl").innerHTML=h;

  drawChart(pts,green,alertYears,goal);
  saveLS(false);
}

// ---- circular visuals (SVG) ----
function drawRing(bal,goal,basis){
  const pct=goal>0?bal/goal:0;const shown=Math.max(0,Math.min(pct,1));
  const r=52,C=2*Math.PI*r,off=C*(1-shown);
  const col=pct>=1?"#059669":(pct>=0.5?"#4f46e5":"#6366f1");
  const svg=`<svg viewBox="0 0 120 120"><g transform="rotate(-90 60 60)">
    <circle cx="60" cy="60" r="${r}" fill="none" stroke="#eef2ff" stroke-width="14"/>
    <circle cx="60" cy="60" r="${r}" fill="none" stroke="${col}" stroke-width="14" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"/>
    </g>
    <text x="60" y="58" text-anchor="middle" font-size="26" font-weight="700" fill="#1e293b">${(pct*100).toFixed(0)}%</text>
    <text x="60" y="76" text-anchor="middle" font-size="10" fill="#64748b">${fmtM(bal)} ${t("ofGoal")}</text></svg>`;
  document.getElementById("ring").innerHTML=svg;
  document.getElementById("ringSub").textContent=`${fmt(bal)} / ${fmt(goal)} THB`;
  document.getElementById("ringCap").textContent=basis;
}
function drawGauge(ratio,year){
  const scale=1.0;const f=Math.max(0,Math.min(ratio/scale,1));
  const cx=60,cy=62,r=48,len=Math.PI*r;
  const col=ratio>0.40?"#dc2626":(ratio>0.30?"#d97706":"#059669");
  const zone=ratio>0.40?t("zoneDanger"):(ratio>0.30?t("zoneWarn"):t("zoneSafe"));
  // threshold tick at 40%
  const ft=0.40;const ang=Math.PI*(1-ft);const tx1=cx+(r-9)*Math.cos(ang),ty1=cy-(r-9)*Math.sin(ang),tx2=cx+(r+9)*Math.cos(ang),ty2=cy-(r+9)*Math.sin(ang);
  const svg=`<svg viewBox="0 0 120 82">
    <path d="M${cx-r},${cy} A${r},${r} 0 0 1 ${cx+r},${cy}" fill="none" stroke="#eef2ff" stroke-width="13" stroke-linecap="round"/>
    <path d="M${cx-r},${cy} A${r},${r} 0 0 1 ${cx+r},${cy}" fill="none" stroke="${col}" stroke-width="13" stroke-linecap="round" stroke-dasharray="${len}" stroke-dashoffset="${len*(1-f)}"/>
    <line x1="${tx1}" y1="${ty1}" x2="${tx2}" y2="${ty2}" stroke="#dc2626" stroke-width="2"/>
    <text x="60" y="52" text-anchor="middle" font-size="24" font-weight="700" fill="${col}">${(ratio*100).toFixed(0)}%</text>
    <text x="60" y="70" text-anchor="middle" font-size="10" fill="#64748b">${zone}</text></svg>`;
  document.getElementById("gauge").innerHTML=svg;
  document.getElementById("gaugeSub").textContent=`${year} ${t("gaugeNow")}`;
  document.getElementById("gaugeCap").textContent=t("thr");
}

let chart;
function drawChart(pts,green,alertYears,goal){
  const labels=pts.map(p=>`${p.y}/${String(p.m).padStart(2,"0")}`);
  const plan=pts.map(p=>Math.round(p.bal));
  const goalLine=pts.map(()=>goal);
  const greenData=green.map(v=>v===null?null:Math.round(v));
  const bandPlugin={id:"bands",beforeDraw(c){const {ctx,chartArea:{top,bottom},scales:{x}}=c;if(!x)return;ctx.save();ctx.fillStyle="rgba(220,38,38,.06)";let start=null;
    pts.forEach((p,i)=>{if(alertYears[p.y]){if(start===null)start=i;}else{if(start!==null){const x0=x.getPixelForValue(start)-3,x1=x.getPixelForValue(i)-3;ctx.fillRect(x0,top,x1-x0,bottom-top);start=null;}}});
    if(start!==null){const x0=x.getPixelForValue(start)-3,x1=x.getPixelForValue(pts.length-1);ctx.fillRect(x0,top,x1-x0,bottom-top);}ctx.restore();}};
  if(chart)chart.destroy();
  chart=new Chart(document.getElementById("chart"),{type:"line",data:{labels,datasets:[
    {label:t("plan"),data:plan,borderColor:"#4f46e5",backgroundColor:"rgba(79,70,229,.06)",fill:true,pointRadius:0,borderWidth:2,tension:.15},
    {label:t("actual"),data:greenData,borderColor:"#059669",pointRadius:ctx=>{const k=`${pts[ctx.dataIndex].y}-${pts[ctx.dataIndex].m}`;return S.actuals[k]!==undefined?3.5:0;},pointBackgroundColor:"#059669",borderWidth:2,borderDash:[4,3],spanGaps:true,tension:.15},
    {label:"Goal",data:goalLine,borderColor:"#dc2626",borderDash:[6,4],pointRadius:0,borderWidth:1.5}
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
    plugins:{legend:{labels:{font:{size:11}}},tooltip:{callbacks:{title:i=>i[0].label,label:c=>c.raw==null?null:c.dataset.label+": "+Number(c.raw).toLocaleString()+" THB"}}},
    scales:{x:{ticks:{maxTicksLimit:18,callback:function(v){const l=this.getLabelForValue(v);return l.endsWith("/01")?l.slice(0,4):"";}}},y:{ticks:{callback:v=>(v/1e6)+"M"}}}},plugins:[bandPlugin]});
}

document.documentElement.lang=S.lang;
applyLang();fillInputs();buildStage();buildActual();
["rate","tax"].forEach(k=>document.getElementById(k).addEventListener("input",()=>{syncRange();calc();}));
numIds.concat(["startM"]).forEach(k=>document.getElementById(k).addEventListener("change",calc));
calc();
</script>
</body>
